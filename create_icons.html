<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generar Iconos</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  
  // Fondo
  ctx.fillStyle = '#6b5f00';
  ctx.fillRect(0, 0, w, w);
  
  // Círculo decorativo
  ctx.fillStyle = '#fbd9d7';
  ctx.beginPath();
  ctx.arc(w/2, w/2, w*0.35, 0, Math.PI * 2);
  ctx.fill();
  
  // Texto "Calc"
  ctx.fillStyle = '#6b5f00';
  ctx.font = `bold ${w*0.18}px Roboto, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CALC', w/2, w/2);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
