<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Calculadora</title>

  <!-- iOS PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calculadora">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1c1c1e">

  <!-- Iconos iOS -->
  <link rel="apple-touch-icon" href="../ios-icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../ios-icon-192.png">

  <!-- Manifest iOS -->
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #1c1c1e;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .container {
      background: #2c2c2e;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      line-height: 1;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    p {
      color: #8e8e93;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 0;
    }

    /* ─── Vista: instrucciones de instalación ─── */
    .steps {
      margin-top: 28px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #3a3a3c;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .step-num {
      background: #ff9500;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      color: #ebebf5cc;
      font-size: 14px;
      line-height: 1.4;
    }

    .step-text strong {
      color: #ffffff;
    }

    .share-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      vertical-align: middle;
      margin: 0 1px -1px;
    }

    /* ─── Vista: formulario de código (standalone) ─── */
    .form-group {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #codeInput {
      background: #3a3a3c;
      border: 1px solid #48484a;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 17px;
      color: #ffffff;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      -webkit-appearance: none;
      width: 100%;
      font-family: inherit;
    }

    #codeInput::placeholder {
      color: #48484a;
      letter-spacing: normal;
    }

    #codeInput:focus {
      border-color: #ff9500;
    }

    #submitBtn {
      background: #ff9500;
      color: #000000;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    #submitBtn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .loader {
      border: 3px solid #3a3a3c;
      border-top: 3px solid #ff9500;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 12px auto 0;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }

    .message.error {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.3);
      color: #ff453a;
      display: block;
    }

    .message.success {
      background: rgba(48, 209, 88, 0.15);
      border: 1px solid rgba(48, 209, 88, 0.3);
      color: #30d158;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Vista A: instrucciones para instalar (modo navegador) -->
  <div id="installView" class="container" style="display:none">
    <span class="icon">📱</span>
    <h1>Instala la app</h1>
    <p>Para usar Calculadora, añádela primero a tu pantalla de inicio.</p>
    <div class="steps">
      <div class="step">
        <span class="step-num">1</span>
        <span class="step-text">
          Toca
          <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 6H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V8a2 2 0 00-2-2h-2"/>
            <polyline points="15 3 12 0 9 3"/>
            <line x1="12" y1="0" x2="12" y2="13"/>
          </svg>
          en la barra de Safari
        </span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span class="step-text">Selecciona <strong>"Añadir a pantalla de inicio"</strong></span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span class="step-text">Abre la app desde tu pantalla de inicio e ingresa tu código</span>
      </div>
    </div>
  </div>

  <!-- Vista B: entrada de código (modo standalone / pantalla de inicio) -->
  <div id="codeView" class="container" style="display:none">
    <span class="icon">🔐</span>
    <h1>Activar acceso</h1>
    <p>Introduce tu código de acceso para continuar.</p>
    <div class="form-group">
      <input
        type="text"
        id="codeInput"
        placeholder="Código de acceso"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="submitBtn" onclick="submitCode()">Continuar</button>
    </div>
    <div class="loader" id="loader"></div>
    <div id="message" class="message"></div>
  </div>

  <script>
    // ================================================
    // UTILIDADES iOS-SAFE
    // ================================================

    function safeLocalStorage(action, key, value) {
      try {
        if (action === 'get') return localStorage.getItem(key);
        if (action === 'set') { localStorage.setItem(key, value); return true; }
        if (action === 'remove') { localStorage.removeItem(key); return true; }
      } catch (e) {
        console.warn('[iOS] localStorage no disponible:', e.message);
        return null;
      }
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function isInStandalone() {
      return ('standalone' in window.navigator && window.navigator.standalone) ||
             window.matchMedia('(display-mode: standalone)').matches;
    }

    // ================================================
    // CONFIGURACIÓN SUPABASE
    // ================================================
    const SUPABASE_URL = "https://zgatennqbagmyfbpiakr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnYXRlbm5xYmFnbXlmYnBpYWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTg3NTEsImV4cCI6MjA4NjU5NDc1MX0.5c_IoL3_PM1zwFsuvblkoCoWbP9-4BSaMcIwSasLprw";

    function getDeviceId() {
      let id = safeLocalStorage('get', 'device_id');
      if (!id) {
        id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
        safeLocalStorage('set', 'device_id', id);
      }
      return id || ('fallback-' + Date.now());
    }

    async function activateLicense(code) {
      const device_id = getDeviceId();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/activate`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({ code, device_id }),
      });
      return res.json();
    }

    function saveSession(token) {
      safeLocalStorage('set', 'session_token', token);
      safeLocalStorage('set', 'last_known_status', 'valid');
    }

    // ================================================
    // UI
    // ================================================
    const loaderEl   = document.getElementById('loader');
    const messageEl  = document.getElementById('message');
    const submitBtn  = document.getElementById('submitBtn');

    function showError(text) {
      messageEl.className = 'message error';
      messageEl.textContent = text;
    }

    const ERROR_MESSAGES = {
      invalid_code:    "El código no existe o ya no es válido.",
      revoked:         "Este acceso ha sido revocado por el administrador.",
      device_mismatch: "Este código ya está activado en otro dispositivo.",
    };

    // ================================================
    // LÓGICA DE ACTIVACIÓN (modo standalone)
    // ================================================
    window.submitCode = async function() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) return;

      loaderEl.style.display = 'block';
      submitBtn.disabled = true;
      messageEl.className = 'message';
      messageEl.textContent = '';

      try {
        const result = await activateLicense(code);

        if (result.session_token) {
          saveSession(result.session_token);
          window.location.href = './core/?t=' + encodeURIComponent(result.session_token);
        } else {
          loaderEl.style.display = 'none';
          submitBtn.disabled = false;
          showError(ERROR_MESSAGES[result.error] || "Ocurrió un error desconocido.");
        }

      } catch (e) {
        loaderEl.style.display = 'none';
        submitBtn.disabled = false;
        showError("Sin conexión al servidor. Verifica tu internet e intenta de nuevo.");
      }
    };

    // Permitir enviar con la tecla Enter
    document.getElementById('codeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitCode();
    });

    // ================================================
    // INICIALIZACIÓN: elegir qué vista mostrar
    // ================================================
    if (isInStandalone()) {
      // Abierto desde la pantalla de inicio — mostrar formulario de código
      document.getElementById('codeView').style.display = 'block';

      // Pre-rellenar si viene con ?k=CODE (útil si el admin comparte enlace directo)
      const params = new URLSearchParams(window.location.search);
      const preCode = params.get('k');
      if (preCode) {
        document.getElementById('codeInput').value = preCode;
      }

    } else {
      // Abierto en el navegador — solo mostrar instrucciones de instalación
      document.getElementById('installView').style.display = 'block';
    }

    // ================================================
    // SERVICE WORKER
    // ================================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('[iOS SW] Registrado'))
        .catch(e => console.warn('[iOS SW] Error:', e));
    }
  </script>
</body>
</html>
